<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#121212">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AHSS Live Bracket</title>

  <style>
    :root{
      --bg:#121212;
      --panel:#0f0f10;
      --panel2:#141415;
      --border:#2d2f33;
      --text:#f0f0f0;
      --muted:#a7abcc;
      --teamA:#d32f2f;
      --teamB:#1976d2;
      --good:#3ddc84;
      --warn:#f2c94c;
      --bad:#ff5252;
      --accent:#00bcd4;
      --radius:14px;
      --shadow:0 14px 40px rgba(0,0,0,.45);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, sans-serif;
      overflow:hidden;
      touch-action:manipulation;
    }

    .page{
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }

    .topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px 12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:280px;
    }

    .brand img{
      max-width:120px;
      height:auto;
      display:block;
    }

    .brand h1{
      margin:0;
      font-size:18px;
      letter-spacing:.3px;
      color:#00eaff;
    }

    .brand .sub{
      margin:2px 0 0;
      color:rgba(255,255,255,.65);
      font-size:13px;
    }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill{
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:12px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:9px 11px;
      cursor:pointer;
      font-weight:900;
      font-size:12px;
      letter-spacing:.2px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:#1f1f1f;
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      user-select:none;
    }

    .btn:hover{
      opacity:.92;
    }

    .btn-primary{
      background:linear-gradient(90deg, var(--teamA), #ffffff, var(--teamB));
      color:#000;
      border:none;
    }

    .viewer{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      padding:10px;
      scrollbar-width:auto;
      scrollbar-color:#00bcd4 #111;
    }

    .viewer::-webkit-scrollbar{
      width:16px;
      height:16px;
    }

    .viewer::-webkit-scrollbar-track{
      background:#111;
      border-radius:999px;
    }

    .viewer::-webkit-scrollbar-thumb{
      background:#00bcd4;
      border-radius:999px;
      border:3px solid #111;
    }

    .viewer::-webkit-scrollbar-corner{
      background:#111;
    }

    .zoomStage{
      transform-origin:top left;
      display:inline-block;
      min-width:max-content;
      min-height:max-content;
    }

    .emptyState{
      max-width:760px;
      margin:90px auto 0;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:24px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .emptyState h2{
      color:#00eaff;
      margin:0 0 8px;
      font-size:22px;
    }

    .emptyState p{
      color:rgba(255,255,255,.72);
      line-height:1.45;
      margin:8px 0;
    }

    .mini{
      font-size:12px;
      color:rgba(255,255,255,.68);
    }

    .bracket{
      min-width:5600px;
      display:block;
      padding:18px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(90deg, rgba(255,90,90,.10), rgba(0,0,0,.08) 33%, rgba(61,220,132,.08) 66%, rgba(0,188,212,.08)),
        rgba(0,0,0,.18);
      position:relative;
    }

    .chartHeader{
      display:grid;
      grid-template-columns:1fr 1fr 280px;
      gap:18px;
      margin-bottom:10px;
    }

    .chartHeaderBox{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.045);
      border-radius:14px;
      padding:10px 12px;
      font-size:12px;
      letter-spacing:.4px;
      text-transform:uppercase;
      color:rgba(255,255,255,.78);
      font-weight:900;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    .chartHeaderBox .sub{
      font-size:11px;
      text-transform:none;
      letter-spacing:0;
      color:rgba(255,255,255,.48);
    }

    .chartBody{
      display:grid;
      grid-template-columns:1fr 1fr 280px;
      gap:18px;
      align-items:start;
    }

    .chartLane{
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      background:rgba(0,0,0,.13);
      min-height:360px;
      padding:14px;
      overflow:visible;
    }

    .chartLane.losersLane{
      background:linear-gradient(90deg, rgba(255,90,90,.08), rgba(0,0,0,.12));
    }

    .chartLane.winnersLane{
      background:linear-gradient(90deg, rgba(0,0,0,.12), rgba(61,220,132,.08));
    }

    .chartLane.finalsLane{
      background:linear-gradient(90deg, rgba(0,188,212,.07), rgba(255,213,79,.06));
    }

    .chartColumns{
      display:flex;
      gap:18px;
      align-items:flex-start;
      overflow:visible;
    }

    .chartColumns.reverseFlow{
      flex-direction:row-reverse;
    }

    .chartColumn{
      min-width:240px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .chartColumnTitle{
      font-size:12px;
      color:rgba(255,255,255,.72);
      letter-spacing:.4px;
      text-transform:uppercase;
      margin:0 0 2px 4px;
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }

    .flowArrow{
      color:rgba(0,234,255,.75);
      font-size:14px;
    }

    .flowNote{
      font-size:11px;
      color:rgba(255,255,255,.48);
      text-transform:none;
      letter-spacing:0;
    }

    .match{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:10px;
    }

    .match.complete{
      border-color:rgba(61,220,132,.38);
    }

    .match.ready{
      border-color:rgba(0,234,255,.38);
    }

    .match.pending{
      opacity:.75;
    }

    .match-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      color:rgba(255,255,255,.75);
      font-size:12px;
    }

    .match-head .tag{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      font-weight:800;
      color:#fff;
      font-size:11px;
      letter-spacing:.2px;
    }

    .callLabel{
      font-weight:1000;
    }

    .callLabel.ready{
      color:var(--good);
    }

    .callLabel.pending{
      color:var(--muted);
    }

    .statusText{
      margin-top:5px;
      text-align:right;
      font-size:11px;
      font-weight:900;
    }

    .statusText.complete{
      color:var(--good);
    }

    .statusText.ready{
      color:#00eaff;
    }

    .statusText.pending{
      color:rgba(255,255,255,.48);
    }

    .slot{
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(88px, auto);
      gap:10px;
      align-items:center;
      margin-bottom:8px;
      padding:8px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.20);
    }

    .slot:last-child{
      margin-bottom:0;
    }

    .slot.win{
      border-color:rgba(61,220,132,.55);
      box-shadow:0 0 0 1px rgba(61,220,132,.18) inset;
    }

    .slot.lose{
      opacity:.78;
      border-color:rgba(255,255,255,.08);
    }

    .name{
      font-weight:900;
      font-size:13px;
      line-height:1.1;
      word-break:break-word;
    }

    .seed{
      font-size:11px;
      color:rgba(255,255,255,.55);
      margin-top:2px;
    }

    .scoreBox{
      width:100%;
      min-width:88px;
      max-width:118px;
      text-align:center;
      padding:8px 8px;
      border-radius:10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-weight:900;
      font-size:18px;
      line-height:1.1;
      outline:none;
      font-variant-numeric:tabular-nums;
      overflow:visible;
      white-space:nowrap;
    }

    .chartPlaceholder{
      border:1px dashed rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      border-radius:14px;
      padding:14px;
      color:rgba(255,255,255,.56);
      font-size:12px;
      text-align:center;
      min-width:210px;
    }

    .footer{
      flex:0 0 auto;
      text-align:center;
      color:rgba(255,255,255,.45);
      font-size:12px;
      padding:2px 0 0;
    }

    @media (max-width:720px){
      .page{
        padding:8px;
      }

      .brand img{
        max-width:92px;
      }

      .brand h1{
        font-size:16px;
      }

      .brand .sub{
        font-size:12px;
      }

      .slot{
        grid-template-columns:minmax(0, 1fr) minmax(76px, auto);
      }

      .scoreBox{
        min-width:76px;
        max-width:104px;
        font-size:16px;
        padding:8px 6px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img id="appLogo" src="logo.png" alt="AHSS Logo" />
        <div>
          <h1>Live Bracket</h1>
          <div class="sub" id="subtitle">Read only tournament snapshot</div>
        </div>
      </div>

      <div class="toolbar">
        <span class="pill" id="snapshotInfo">Loading snapshot...</span>
        <span class="pill" id="refreshInfo">Refresh: 20s</span>
        <button class="btn" id="btnZoomOut" type="button">Zoom Out</button>
        <button class="btn" id="btnZoomIn" type="button">Zoom In</button>
        <button class="btn btn-primary" id="btnFit" type="button">Fit Width</button>
        <button class="btn btn-primary" id="btnRefresh" type="button">Refresh</button>
      </div>
    </div>

    <div class="viewer" id="viewer">
      <div class="zoomStage" id="zoomStage">
        <div id="bracketRoot"></div>
      </div>
    </div>

    <div class="footer">
      brackets.html read only live view
    </div>
  </div>

  <script>
    const STATE_KEY = "ahss_brackets_state";
    const REFRESH_MS = 20000;
    const ZOOM_KEY = "AHSS_LIVE_BRACKET_ZOOM";
    const SCROLL_LEFT_KEY = "AHSS_LIVE_BRACKET_SCROLL_LEFT";
    const SCROLL_TOP_KEY = "AHSS_LIVE_BRACKET_SCROLL_TOP";

    let liveZoom = 1;
    let refreshTimer = null;

    const $ = (sel, root=document) => root.querySelector(sel);

    function esc(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function fmtLocal(ts){
      if(!ts) return "";
      try{
        return new Date(ts).toLocaleString();
      }catch{
        return String(ts);
      }
    }

    function isRealBracketName(name){
      return !!name && name !== "TBD" && name !== "BYE";
    }

    function matchCallLabel(m){
      return m && m.callNumber ? `Match ${m.callNumber}` : "Match Pending";
    }

    function isMatchVisibleOnChart(m){
      if(!m) return false;
      if(m.winner) return true;
      return isRealBracketName(m.p1) || isRealBracketName(m.p2);
    }

    function roundHasVisibleMatch(round){
      return (round || []).some(isMatchVisibleOnChart);
    }

    function visibleWindowForRounds(rounds){
      if(!rounds || !rounds.length) return [];

      return rounds.map((round, idx) => ({
        round,
        idx,
        isFuture: !roundHasVisibleMatch(round)
      }));
    }

    function shouldShowFinals(state){
      const gf = state && state.grandFinal ? state.grandFinal : [];

      if(gf.some(isMatchVisibleOnChart)){
        return true;
      }

      const winnersLast =
        state.winnersRounds &&
        state.winnersRounds[state.winnersRounds.length - 1]
          ? state.winnersRounds[state.winnersRounds.length - 1][0]
          : null;

      const losersLastRound =
        state.losersRounds &&
        state.losersRounds[state.losersRounds.length - 1]
          ? state.losersRounds[state.losersRounds.length - 1]
          : [];

      const losersLast = losersLastRound.length ? losersLastRound[losersLastRound.length - 1] : null;

      return !!(winnersLast && winnersLast.winner) || !!(losersLast && losersLast.winner);
    }

    function loadBracketState(){
      try{
        const raw = localStorage.getItem(STATE_KEY);

        if(!raw){
          return null;
        }

        const state = JSON.parse(raw);

        if(!state || !state.winnersRounds){
          return null;
        }

        return state;
      }catch(e){
        console.warn("Unable to load bracket state:", e);
        return null;
      }
    }

    function countMatches(state){
      let total = 0;

      (state.winnersRounds || []).forEach(round => total += round.length);
      (state.losersRounds || []).forEach(round => total += round.length);
      (state.grandFinal || []).forEach(() => total += 1);

      return total;
    }

    function getMatchStatus(m){
      if(!m) return "pending";
      if(m.winner) return "complete";
      if(isRealBracketName(m.p1) && isRealBracketName(m.p2)) return "ready";
      return "pending";
    }

    function getStatusText(status){
      if(status === "complete") return "Complete";
      if(status === "ready") return "Ready";
      return "Pending";
    }

    function renderSlot(match, lane, which){
      const slot = document.createElement("div");
      slot.className = "slot";

      if(match.winner === which){
        slot.classList.add("win");
      }

      if(match.winner && match.winner !== which){
        slot.classList.add("lose");
      }

      const rawName = (which === "p1" ? match.p1 : match.p2) || "TBD";
      const otherName = (which === "p1" ? match.p2 : match.p1) || "TBD";
      const waitingBye = rawName === "TBD" && isRealBracketName(otherName);
      const displayName = waitingBye ? "BYE" : rawName;
      const score = which === "p1" ? (match.s1 ?? "") : (match.s2 ?? "");
      const id = match.id || "";

      slot.innerHTML = `
        <div>
          <div class="name">${esc(displayName)}</div>
          <div class="seed">${esc(id)} ${which.toUpperCase()}</div>
        </div>
        <div class="scoreBox">${esc(score)}</div>
      `;

      return slot;
    }

    function renderMatchCard(match, lane){
      const card = document.createElement("div");
      const status = getMatchStatus(match);

      card.className = `match ${status}`;

      const tagText = lane === "W" ? "W" : lane === "L" ? "L" : "GF";

      const routeLabel = match.goldenCrossoverLabel
        ? ` <span class="mini" style="color:#00eaff;">${esc(match.goldenCrossoverLabel)}</span>`
        : "";

      const callLabel = matchCallLabel(match);
      const callClass = match.callNumber ? "ready" : "pending";

      card.innerHTML = `
        <div class="match-head">
          <div>
            <div class="callLabel ${callClass}">${esc(callLabel)}</div>
            <div>${esc(match.label || match.id || "")}${routeLabel}</div>
          </div>
          <div>
            <div class="tag">${tagText}</div>
            <div class="statusText ${status}">${esc(getStatusText(status))}</div>
          </div>
        </div>
      `;

      card.appendChild(renderSlot(match, lane, "p1"));
      card.appendChild(renderSlot(match, lane, "p2"));

      return card;
    }

    function buildUnifiedRoundColumn(round, idx, lane, isFuture=false){
      const col = document.createElement("div");
      col.className = "chartColumn";

      const laneName = lane === "W" ? "Winners" : "Losers";
      const arrow = lane === "W" ? "→" : (isFuture ? "…" : "←");
      const note = isFuture ? "next" : (lane === "W" ? "right" : "left");

      col.innerHTML = `
        <div class="chartColumnTitle">
          ${esc(laneName)} R${esc(idx + 1)}
          <span class="flowArrow">${esc(arrow)}</span>
          <span class="flowNote">${esc(note)}</span>
        </div>
      `;

      if(isFuture){
        col.innerHTML += `<div class="chartPlaceholder">Waiting for feeder match or BYE.</div>`;
        return col;
      }

      round.forEach(m => {
        if(isMatchVisibleOnChart(m)){
          col.appendChild(renderMatchCard(m, lane));
        }
      });

      return col;
    }

    function buildBracketChart(state){
      const bracketEl = document.createElement("div");
      bracketEl.className = "bracket";

      const losersVisible = visibleWindowForRounds(state.losersRounds || []);
      const winnersVisible = visibleWindowForRounds(state.winnersRounds || []);
      const finalsVisible = shouldShowFinals(state);

      bracketEl.innerHTML = `
        <div class="chartHeader">
          <div class="chartHeaderBox">
            <span>Losers Side</span>
            <span class="sub">flows left</span>
          </div>
          <div class="chartHeaderBox">
            <span>Winners Side</span>
            <span class="sub">flows right</span>
          </div>
          <div class="chartHeaderBox">
            <span>Finals</span>
            <span class="sub">reconnects</span>
          </div>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "chartBody";

      const losersLane = document.createElement("div");
      losersLane.className = "chartLane losersLane";

      const losersCols = document.createElement("div");
      losersCols.className = "chartColumns reverseFlow";

      if(losersVisible.length){
        losersVisible.forEach(item => {
          losersCols.appendChild(buildUnifiedRoundColumn(item.round, item.idx, "L", item.isFuture));
        });
      }else{
        losersCols.innerHTML = `<div class="chartPlaceholder">Losers side appears when a player drops from winners.</div>`;
      }

      losersLane.appendChild(losersCols);

      const winnersLane = document.createElement("div");
      winnersLane.className = "chartLane winnersLane";

      const winnersCols = document.createElement("div");
      winnersCols.className = "chartColumns";

      if(winnersVisible.length){
        winnersVisible.forEach(item => {
          winnersCols.appendChild(buildUnifiedRoundColumn(item.round, item.idx, "W", item.isFuture));
        });
      }else{
        winnersCols.innerHTML = `<div class="chartPlaceholder">No active winners matches yet.</div>`;
      }

      winnersLane.appendChild(winnersCols);

      const finalsLane = document.createElement("div");
      finalsLane.className = "chartLane finalsLane";

      const finalsCols = document.createElement("div");
      finalsCols.className = "chartColumns";

      const gfCol = document.createElement("div");
      gfCol.className = "chartColumn";
      gfCol.innerHTML = `<div class="chartColumnTitle">Grand Final <span class="flowArrow">★</span></div>`;

      if(finalsVisible){
        (state.grandFinal || []).forEach(m => {
          if(isMatchVisibleOnChart(m)){
            gfCol.appendChild(renderMatchCard(m, "GF"));
          }
        });
      }else{
        gfCol.innerHTML += `<div class="chartPlaceholder">Grand Final appears when the winners champ and losers champ are ready.</div>`;
      }

      finalsCols.appendChild(gfCol);
      finalsLane.appendChild(finalsCols);

      body.appendChild(losersLane);
      body.appendChild(winnersLane);
      body.appendChild(finalsLane);

      bracketEl.appendChild(body);

      return bracketEl;
    }

    function renderEmptyState(){
      const root = $("#bracketRoot");

      root.innerHTML = `
        <div class="emptyState">
          <h2>No bracket snapshot found</h2>
          <p>
            Open Tournament Director in this same browser, build or load a bracket,
            then come back to this page.
          </p>
          <p class="mini">
            This page is read only and uses the saved local bracket snapshot.
          </p>
        </div>
      `;

      $("#snapshotInfo").textContent = "No snapshot";
      $("#subtitle").textContent = "Waiting for Tournament Director bracket data";
    }

    function renderLiveBracket(){
      const root = $("#bracketRoot");
      const state = loadBracketState();

      if(!state){
        renderEmptyState();
        $("#refreshInfo").textContent = `Last check: ${new Date().toLocaleTimeString()}`;
        return;
      }

      const oldLeft = $("#viewer").scrollLeft;
      const oldTop = $("#viewer").scrollTop;

      root.innerHTML = "";
      root.appendChild(buildBracketChart(state));

      const entrants = Array.isArray(state.entrants) ? state.entrants.length : 0;
      const size = state.bracketSize || "";
      const matches = countMatches(state);

      $("#snapshotInfo").textContent = `${entrants} entrants | Size ${size} | ${matches} matches`;
      $("#refreshInfo").textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
      $("#subtitle").textContent = state.createdAt ? `Snapshot created ${fmtLocal(state.createdAt)}` : "Read only tournament snapshot";

      requestAnimationFrame(() => {
        $("#viewer").scrollLeft = oldLeft;
        $("#viewer").scrollTop = oldTop;
      });
    }

    function setZoomPercent(pct, keepCenter=true){
      const viewer = $("#viewer");
      const stage = $("#zoomStage");

      if(!viewer || !stage) return;

      const oldZoom = liveZoom;
      const nextZoom = Math.max(0.25, Math.min(2.5, pct / 100));

      let centerX = 0;
      let centerY = 0;

      if(keepCenter && oldZoom > 0){
        centerX = (viewer.scrollLeft + viewer.clientWidth / 2) / oldZoom;
        centerY = (viewer.scrollTop + viewer.clientHeight / 2) / oldZoom;
      }

      liveZoom = nextZoom;
      stage.style.transform = `scale(${liveZoom})`;
      localStorage.setItem(ZOOM_KEY, String(Math.round(liveZoom * 100)));

      requestAnimationFrame(() => {
        if(keepCenter){
          viewer.scrollLeft = Math.max(0, centerX * liveZoom - viewer.clientWidth / 2);
          viewer.scrollTop = Math.max(0, centerY * liveZoom - viewer.clientHeight / 2);
        }
      });
    }

    function zoomIn(){
      setZoomPercent((liveZoom * 100) + 10);
    }

    function zoomOut(){
      setZoomPercent((liveZoom * 100) - 10);
    }

    function fitWidth(){
      const viewer = $("#viewer");
      const stage = $("#zoomStage");
      const content = $("#bracketRoot .bracket");

      if(!viewer || !stage || !content) return;

      const oldTransform = stage.style.transform;
      stage.style.transform = "scale(1)";

      const available = Math.max(300, viewer.clientWidth - 28);
      const needed = content.scrollWidth || content.offsetWidth || 5600;
      const targetPct = Math.max(25, Math.min(250, Math.floor((available / needed) * 100)));

      stage.style.transform = oldTransform;
      setZoomPercent(targetPct, false);

      viewer.scrollLeft = 0;
      viewer.scrollTop = 0;
    }

    function saveScrollPosition(){
      const viewer = $("#viewer");

      if(!viewer) return;

      sessionStorage.setItem(SCROLL_LEFT_KEY, String(viewer.scrollLeft));
      sessionStorage.setItem(SCROLL_TOP_KEY, String(viewer.scrollTop));
    }

    function restoreScrollPosition(){
      const viewer = $("#viewer");

      if(!viewer) return;

      const left = parseInt(sessionStorage.getItem(SCROLL_LEFT_KEY) || "0", 10);
      const top = parseInt(sessionStorage.getItem(SCROLL_TOP_KEY) || "0", 10);

      requestAnimationFrame(() => {
        viewer.scrollLeft = isFinite(left) ? left : 0;
        viewer.scrollTop = isFinite(top) ? top : 0;
      });
    }

    function wireViewer(){
      const viewer = $("#viewer");

      if(!viewer) return;

      viewer.addEventListener("scroll", saveScrollPosition);

      viewer.addEventListener("wheel", e => {
        if(e.shiftKey && Math.abs(e.deltaY) > Math.abs(e.deltaX)){
          viewer.scrollLeft += e.deltaY;
          e.preventDefault();
        }

        if(e.ctrlKey || e.metaKey){
          e.preventDefault();

          if(e.deltaY < 0){
            zoomIn();
          }else{
            zoomOut();
          }
        }
      }, { passive:false });
    }

    function applySavedTheme(){
      const a = localStorage.getItem("ahss_theme_teamA");
      const b = localStorage.getItem("ahss_theme_teamB");
      const logo = localStorage.getItem("ahss_custom_logo_data");
      const img = $("#appLogo");

      if(a) document.documentElement.style.setProperty("--teamA", a);
      if(b) document.documentElement.style.setProperty("--teamB", b);
      if(logo && img) img.src = logo;
    }

    function startAutoRefresh(){
      if(refreshTimer){
        clearInterval(refreshTimer);
      }

      refreshTimer = setInterval(() => {
        renderLiveBracket();
      }, REFRESH_MS);
    }

    document.addEventListener("DOMContentLoaded", () => {
      applySavedTheme();

      $("#btnRefresh").addEventListener("click", renderLiveBracket);
      $("#btnZoomIn").addEventListener("click", zoomIn);
      $("#btnZoomOut").addEventListener("click", zoomOut);
      $("#btnFit").addEventListener("click", fitWidth);

      wireViewer();

      const savedZoom = parseInt(localStorage.getItem(ZOOM_KEY) || "100", 10);
      setZoomPercent(isFinite(savedZoom) ? savedZoom : 100, false);

      renderLiveBracket();
      restoreScrollPosition();
      startAutoRefresh();
    });
  </script>
</body>
</html>
